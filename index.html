<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>css art generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<header>
  <h1>CSS <span>ART</span> GENERATOR</h1>
  <span class="header-tag">HTML/CSS</span>
  <div class="header-actions">
    <button class="btn" id="btnCode">{ } code</button>
    <button class="btn btn-primary" id="btnDownload">↓ export</button>
  </div>
</header>

<aside>
  <div>
    <div class="section-title">Style preset</div>
    <div class="preset-grid" id="presets">
      <button class="preset-btn active" data-p="geometric">Geometric</button>
      <button class="preset-btn" data-p="waves">Waves</button>
      <button class="preset-btn" data-p="mandala">Mandala</button>
      <button class="preset-btn" data-p="nebula">Nebula</button>
      <button class="preset-btn" data-p="grid">Grid burst</button>
      <button class="preset-btn" data-p="flow">Flow field</button>
    </div>
  </div>


  <div>
    <div class="section-title">Color palette</div>
    <div class="color-row">
      <div class="color-item">
        <label>Color A</label>
        <div class="color-swatch" onclick="this.querySelector('input').click()">
          <input type="color" id="cA" value="#a78bfa">
          <span class="color-hex" id="cA-hex">#a78bfa</span>
        </div>
      </div>
      <div class="color-item">
        <label>Color B</label>
        <div class="color-swatch" onclick="this.querySelector('input').click()">
          <input type="color" id="cB" value="#34d399">
          <span class="color-hex" id="cB-hex">#34d399</span>
        </div>
      </div>
      <div class="color-item">
        <label>Accent</label>
        <div class="color-swatch" onclick="this.querySelector('input').click()">
          <input type="color" id="cC" value="#fb923c">
          <span class="color-hex" id="cC-hex">#fb923c</span>
        </div>
      </div>
      <div class="color-item">
        <label>Background</label>
        <div class="color-swatch" onclick="this.querySelector('input').click()">
          <input type="color" id="cBg" value="#0a0a1a">
          <span class="color-hex" id="cBg-hex">#0a0a1a</span>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">Parameters</div>
    <div class="slider-block">
      <div class="slider-row">
        <div class="slider-label"><span>Complexity</span><span id="vComp">60</span></div>
        <input type="range" id="sComp" min="8" max="140" value="60" step="1">
      </div>
      <div class="slider-row">
        <div class="slider-label"><span>Element size</span><span id="vSize">30</span></div>
        <input type="range" id="sSize" min="4" max="90" value="30" step="1">
      </div>
      <div class="slider-row">
        <div class="slider-label"><span>Rotation</span><span id="vRot">45°</span></div>
        <input type="range" id="sRot" min="0" max="360" value="45" step="1">
      </div>
      <div class="slider-row">
        <div class="slider-label"><span>Opacity</span><span id="vOp">80%</span></div>
        <input type="range" id="sOp" min="10" max="100" value="80" step="1">
      </div>
      <div class="slider-row">
        <div class="slider-label"><span>Spread</span><span id="vSpread">50</span></div>
        <input type="range" id="sSpread" min="10" max="100" value="50" step="1">
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">Options</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="toggle-row">
        <span>Animate</span>
        <div class="toggle on" id="togAnimate"></div>
      </div>
      <div class="toggle-row">
        <span>Mirror symmetry</span>
        <div class="toggle" id="togMirror"></div>
      </div>
      <div class="toggle-row">
        <span>Glow effect</span>
        <div class="toggle" id="togGlow"></div>
      </div>
    </div>
  </div>
  <div>
    <div class="section-title">Actions</div>
    <div class="btn-group">
      <button class="btn" id="btnRandom">↺ random</button>
      <button class="btn" id="btnRegen">⟳ regen</button>
    </div>
  </div>
</aside>

<main>
  <div class="canvas-toolbar">
    <div class="dot red"></div>
    <div class="dot orange"></div>
    <div class="dot"></div>
    <span id="presetLabel">geometric.css</span>
    <div class="canvas-info">
      <span>600 × 600</span>
      <span id="elemCount">0 elements</span>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="600" height="600"></canvas>
  </div>

  <div class="code-panel" id="codePanel">
    <div class="code-inner" id="codeOut"></div>
  </div>
</main>
</body>
</html>
