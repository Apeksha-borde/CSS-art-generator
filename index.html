<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Art Generator PRO</title>

<style>
  
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  height:100vh;
  display:flex;
  /* background:#18191d ,#d4bcc9; */
  background-size:600% 600%;
  background: #d4bcc9;
  animation:bg 12s infinite;
  color:white;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

header{
  position:fixed;
  top:0;
  height: 119px;
  width:100%;
  text-align:center;
  padding:50px;
  background:#18191d ;
  font-size:22px;
  backdrop-filter:blur(10px);
}

main{
  display:flex;
  width:100%;
  margin-top:70px;
}

/* CONTROLS */
#controls{
  width:400px;
  padding:20px;
  margin-top: 50px;
  background:#d4bcc9;
  backdrop-filter:blur(12px);
}

label{
  display:block;
  margin-top:10px;
  font-size:14px;
}

input,select,button{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:8px;
}

button{
  background:#18191d;
  color:white;
  cursor:pointer;
  margin-top:20px;
  padding: 20px 15px;
  transition:0.3s;
}

button:hover{
  background:#d4bcc9;
  color: rgb(0, 0, 0);
  transform:scale(1.05);
}

/* CANVAS */
#canvas{
  flex:1;
  position:relative;
  overflow:hidden;
  perspective:1000px;
}

.shape{
  position:absolute;
  cursor:grab;
  transform-style:preserve-3d;
}

.circle{border-radius:50%;}
.square
.triangle{
  width:0;
  height:0;
  border-left:40px solid transparent;
  border-right:40px solid transparent;
  border-bottom:80px solid red;
}

/* GRID MODE */
.grid{
  display:grid;
  grid-template-columns:repeat(20,1fr);
}

.pixel{
  aspect-ratio:1;
  border:1px solid #222;
}
</style>
</head>

<body>

<header> CSS ART GENERATOR </header>

<main>

<aside id="controls">

<label>Shape</label>
<select id="shapeType">
<option value="circle">Circle</option>
<option value="square">Square</option>
<option value="triangle">Triangle</option>
</select>

<label>Color</label>
<input type="color" id="color" value="#ff4d4d">

<label>Size</label>
<input type="range" id="size" min="30" max="150" value="80">

<label>Rotate</label>
<input type="range" id="rotate" min="0" max="360" value="0">

<button onclick="addShape()">Add Shape</button>
<button onclick="randomArt()">Random Art</button>
<button onclick="saveImage()">Save Image</button>
<button onclick="exportCSS()">Export CSS</button>
<button onclick="createGrid()">Pixel Mode</button>
<button onclick="clearCanvas()">Clear</button>

</aside>

<section id="canvas"></section>

</main>

<script>

let zCounter = 1;

/* ADD SHAPE */
function addShape(){
  const canvas = document.getElementById("canvas");

  if(canvas.classList.contains("grid")) return;

  const type = document.getElementById("shapeType").value;
  const color = document.getElementById("color").value;
  const size = document.getElementById("size").value;
  const rotate = document.getElementById("rotate").value;

  const shape = document.createElement("div");
  shape.classList.add("shape", type);

  if(type !== "triangle"){
    shape.style.width = size+"px";
    shape.style.height = size+"px";
    shape.style.background = color;
  } else {
    shape.style.borderBottomColor = color;
  }

  shape.style.left = Math.random()*80+"%";
  shape.style.top = Math.random()*80+"%";

  const rx = Math.random()*360;
  const ry = Math.random()*360;

  shape.style.transform = `rotate(${rotate}deg) rotateX(${rx}deg) rotateY(${ry}deg)`;

  shape.style.zIndex = zCounter++;

  shape.addEventListener("click",()=>{
    shape.style.zIndex = ++zCounter;
  });

  /* FLOAT ANIMATION */
  shape.animate([
    {transform:`translateY(0px)`},
    {transform:`translateY(-20px)`},
    {transform:`translateY(0px)`}
  ],{
    duration:2000+Math.random()*2000,
    iterations:Infinity
  });

  canvas.appendChild(shape);
}

/* RANDOM ART */
function randomArt(){
  for(let i=0;i<5;i++){
    document.getElementById("shapeType").value =
    ["circle","square","triangle"][Math.floor(Math.random()*3)];

    document.getElementById("color").value =
    '#'+Math.floor(Math.random()*16777215).toString(16);

    document.getElementById("size").value =
    Math.floor(Math.random()*120)+30;

    document.getElementById("rotate").value =
    Math.floor(Math.random()*360);

    addShape();
  }
}

/* DRAG SYSTEM */
let active=null,offsetX=0,offsetY=0;

document.addEventListener("mousedown",(e)=>{
  if(e.target.classList.contains("shape")){
    active=e.target;
    offsetX=e.offsetX;
    offsetY=e.offsetY;
  }
});

document.addEventListener("mouseup",()=>active=null);

document.addEventListener("mousemove",(e)=>{
  if(active){
    active.style.left=(e.pageX-offsetX)+"px";
    active.style.top=(e.pageY-offsetY)+"px";
  }
});

/* SAVE IMAGE */
function saveImage(){
  html2canvas(document.getElementById("canvas")).then(canvas=>{
    const link=document.createElement("a");
    link.download="css-art.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

/* EXPORT CSS */
function exportCSS(){
  let css="";
  document.querySelectorAll(".shape").forEach((el,i)=>{
    css+=`.shape${i}{\n`;
    css+=`width:${el.style.width};\n`;
    css+=`height:${el.style.height};\n`;
    css+=`background:${el.style.background};\n`;
    css+=`transform:${el.style.transform};\n`;
    css+=`position:absolute;\n`;
    css+=`left:${el.style.left};\n`;
    css+=`top:${el.style.top};\n}\n\n`;
  });

  console.log(css);
  alert("CSS copied to console");
}

/* GRID MODE */
function createGrid(){
  const canvas=document.getElementById("canvas");
  canvas.innerHTML="";
  canvas.classList.add("grid");

  for(let i=0;i<400;i++){
    const pixel=document.createElement("div");
    pixel.classList.add("pixel");

    pixel.onclick=()=>{
      pixel.style.background=document.getElementById("color").value;
    };

    canvas.appendChild(pixel);
  }
}

/* CLEAR */
function clearCanvas(){
  const canvas=document.getElementById("canvas");
  canvas.innerHTML="";
  canvas.classList.remove("grid");
}

</script>

</body>
</html>
